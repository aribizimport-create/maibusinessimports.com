<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page introuvable — Maï Business Import</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/images/favicon-16.png">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
--navy:#1B2A4A;--navy-dark:#111B30;--gold:#F0A202;--coral:#E8543E;--coral-dark:#C23F2C;
--cream:#FBF6EE;--ink:#1C1B1F;--muted:#746C5E;--white:#FFFFFF;
--font-display:'Fraunces', serif;--font-body:'Inter', sans-serif;
--shadow-md:0 12px 32px rgba(27,42,74,0.12);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font-body);color:var(--ink);background:var(--cream);min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;}
.box{max-width:480px;}
.logo{display:inline-flex;align-items:center;gap:10px;font-family:var(--font-display);font-weight:700;font-size:22px;color:var(--navy);margin-bottom:34px;text-decoration:none;}
.logo img{height:52px;width:52px;object-fit:cover;border-radius:12px;box-shadow:var(--shadow-md);}
.logo span{color:var(--coral);}
.code{font-family:var(--font-display);font-size:74px;font-weight:700;color:var(--navy);line-height:1;margin-bottom:10px;}
h1{font-family:var(--font-display);font-size:22px;color:var(--navy);margin-bottom:12px;}
p{color:var(--muted);font-size:14.5px;margin-bottom:28px;line-height:1.6;}
.actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
.btn{display:inline-flex;align-items:center;gap:8px;padding:13px 26px;border-radius:999px;font-weight:600;font-size:14px;text-decoration:none;transition:.2s;}
.btn-primary{background:var(--navy);color:#fff;}
.btn-primary:hover{background:var(--coral);}
.btn-ghost{background:transparent;color:var(--navy);border:1.5px solid var(--navy);}
.btn-ghost:hover{background:var(--navy);color:#fff;}
</style>
</head>
<body>
  <div class="box">
    <a href="/index.html" class="logo"><img src="/images/logo-mark.png" alt="Maï Business Import">Maï Business <span>Import</span></a>
    <div class="code">404</div>
    <h1>Cette page n'existe pas</h1>
    <p>Le lien que vous avez suivi est peut-être incorrect ou la page a été déplacée. Retrouvez nos produits ou revenez à l'accueil.</p>
    <div class="actions">
      <a href="/index.html" class="btn btn-primary">Retour à l'accueil</a>
      <a href="/boutique.html" class="btn btn-ghost">Voir la boutique</a>
    </div>
  </div>
</body>
</html>
